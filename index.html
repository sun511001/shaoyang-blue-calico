<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邵阳蓝印花布 · 非遗纹样</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ==================== Header ==================== -->
    <header class="header">
        <div class="header__ornament header__ornament--top">
            <svg viewBox="0 0 1200 40" preserveAspectRatio="none">
                <defs>
                    <pattern id="meander" x="0" y="0" width="60" height="40" patternUnits="userSpaceOnUse">
                        <path d="M0,20 L10,20 L10,5 L20,5 L20,35 L30,35 L30,5 L40,5 L40,20 L50,20 L50,5 L60,5"
                              fill="none" stroke="currentColor" stroke-width="1.5"/>
                    </pattern>
                </defs>
                <rect width="1200" height="40" fill="url(#meander)" opacity="0.4"/>
            </svg>
        </div>

        <div class="header__content">
            <div class="header__decor header__decor--left">
                <svg width="80" height="120" viewBox="0 0 80 120">
                    <circle cx="40" cy="60" r="30" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/>
                    <circle cx="40" cy="60" r="22" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.2"/>
                    <text x="40" y="67" text-anchor="middle" font-size="28" fill="currentColor" opacity="0.6">蓝</text>
                </svg>
            </div>

            <div class="header__text">
                <h1 class="header__title">
                    <span class="header__title-main">邵阳蓝印花布</span>
                    <span class="header__title-sub">非物质文化遗产 · 纹样图鉴</span>
                </h1>
                <p class="header__desc">
                    蓝印花布，又称靛蓝花布，是湖南邵阳地区的传统民间印染工艺品。
                    以靛蓝为染料，通过镂版刮浆防染工艺，在纯棉布上印出蓝白相间的精美纹样，
                    承载着千百年来劳动人民的智慧与美好祝愿。
                </p>
            </div>

            <div class="header__decor header__decor--right">
                <svg width="80" height="120" viewBox="0 0 80 120">
                    <circle cx="40" cy="60" r="30" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/>
                    <circle cx="40" cy="60" r="22" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.2"/>
                    <text x="40" y="67" text-anchor="middle" font-size="28" fill="currentColor" opacity="0.6">印</text>
                </svg>
            </div>
        </div>

        <div class="header__ornament header__ornament--bottom">
            <svg viewBox="0 0 1200 40" preserveAspectRatio="none">
                <rect width="1200" height="40" fill="url(#meander)" opacity="0.4"/>
            </svg>
        </div>
    </header>

    <!-- ==================== Navigation ==================== -->
    <nav class="nav">
        <div class="nav__tabs">
            <button class="nav__tab nav__tab--active" data-tab="gallery">
                <svg class="nav__icon" width="20" height="20" viewBox="0 0 20 20">
                    <rect x="2" y="2" width="7" height="7" rx="1" fill="currentColor" opacity="0.7"/>
                    <rect x="11" y="2" width="7" height="7" rx="1" fill="currentColor" opacity="0.7"/>
                    <rect x="2" y="11" width="7" height="7" rx="1" fill="currentColor" opacity="0.7"/>
                    <rect x="11" y="11" width="7" height="7" rx="1" fill="currentColor" opacity="0.7"/>
                </svg>
                纹样图鉴
            </button>
            <button class="nav__tab" data-tab="process">
                <svg class="nav__icon" width="20" height="20" viewBox="0 0 20 20">
                    <circle cx="4" cy="10" r="2" fill="currentColor" opacity="0.7"/>
                    <line x1="6" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
                    <circle cx="16" cy="10" r="2" fill="currentColor" opacity="0.7"/>
                    <circle cx="4" cy="4" r="1.5" fill="currentColor" opacity="0.5"/>
                    <line x1="5.5" y1="4" x2="14.5" y2="4" stroke="currentColor" stroke-width="1" opacity="0.3"/>
                    <circle cx="16" cy="4" r="1.5" fill="currentColor" opacity="0.5"/>
                    <circle cx="4" cy="16" r="1.5" fill="currentColor" opacity="0.5"/>
                    <line x1="5.5" y1="16" x2="14.5" y2="16" stroke="currentColor" stroke-width="1" opacity="0.3"/>
                    <circle cx="16" cy="16" r="1.5" fill="currentColor" opacity="0.5"/>
                </svg>
                制作工艺
            </button>
        </div>
    </nav>

    <!-- ==================== Main Content ==================== -->
    <main class="main">

        <!-- ============ Gallery Section ============ -->
        <section class="section section--gallery" id="section-gallery">
            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-bar__categories" id="category-filters">
                    <button class="filter-bar__cat filter-bar__cat--active" data-category="全部">全部</button>
                    <button class="filter-bar__cat" data-category="花鸟鱼虫">花鸟鱼虫</button>
                    <button class="filter-bar__cat" data-category="祥瑞神兽">祥瑞神兽</button>
                    <button class="filter-bar__cat" data-category="吉祥文字">吉祥文字</button>
                    <button class="filter-bar__cat" data-category="几何纹样">几何纹样</button>
                </div>
                <div class="filter-bar__search">
                    <svg class="filter-bar__search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="search-input" class="filter-bar__search-input" placeholder="搜索纹样名称或含义...">
                </div>
            </div>

            <!-- Pattern Grid -->
            <div class="pattern-grid" id="pattern-grid">
                <!-- JS rendered -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="empty-state" style="display:none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <p>未找到匹配的纹样</p>
                <span>试试其他关键词或分类吧</span>
            </div>
        </section>

        <!-- ============ Process Section ============ -->
        <section class="section section--process" id="section-process" style="display:none;">
            <h2 class="section__title">
                <span class="section__title-decor left"></span>
                蓝印花布 · 制作工艺
                <span class="section__title-decor right"></span>
            </h2>
            <p class="section__subtitle">一方蓝印花布，六道匠心工序</p>

            <div class="process-timeline" id="process-timeline">
                <!-- JS rendered -->
            </div>
        </section>

    </main>

    <!-- ==================== Pattern Detail Modal ==================== -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <button class="modal__close" id="modal-close" aria-label="关闭">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>

            <div class="modal__image" id="modal-image">
                <!-- Placeholder image area -->
            </div>

            <div class="modal__body">
                <h2 class="modal__title" id="modal-title"></h2>
                <span class="modal__category" id="modal-category"></span>

                <div class="modal__info">
                    <div class="modal__info-item">
                        <h4>纹样含义</h4>
                        <p id="modal-meaning"></p>
                    </div>
                    <div class="modal__info-item">
                        <h4>寓意象征</h4>
                        <p id="modal-symbolism"></p>
                    </div>
                    <div class="modal__info-item">
                        <h4>常见用途</h4>
                        <p id="modal-usage"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== Footer ==================== -->
    <footer class="footer">
        <div class="footer__ornament">
            <svg viewBox="0 0 1200 30" preserveAspectRatio="none">
                <rect width="1200" height="30" fill="url(#meander)" opacity="0.3"/>
            </svg>
        </div>
        <div class="footer__content">
            <p class="footer__text">邵阳蓝印花布 · 非物质文化遗产传承</p>
            <p class="footer__sub">三下乡社会实践项目 · 湖南邵阳</p>
            <p class="footer__copy">© 2026 蓝印花布非遗保护 · 传承匠心之美</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
