# ============================================================
# Nginx 配置 — 邵阳蓝印花布
# 放到 /etc/nginx/sites-available/ 或 /etc/nginx/conf.d/
# ============================================================

server {
    listen 80;
    server_name _;  # 替换为你的域名或服务器 IP

    # 日志
    access_log /var/log/nginx/blue-calico-access.log;
    error_log  /var/log/nginx/blue-calico-error.log;

    # 上传大小限制（AI 生成图片 base64 可能较大）
    client_max_body_size 20m;

    # 静态文件直接由 Nginx 服务
    location / {
        root /home/www/shaoyang-blue-calico;
        index index.html;
        try_files $uri $uri/ $uri.html =404;
    }

    # API 转发到 Node.js
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;  # AI 生成可能较慢
    }
}
